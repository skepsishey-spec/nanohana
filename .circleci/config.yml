version: 2.1

jobs:
  build:
    docker:
      - image: cimg/node:18.17.0
    working_directory: ~/project
    steps:
      - checkout
      - run:
          name: "準備（インストール）"
          command: npm install
      - run:
          name: "組み立て（ビルド）"
          command: npm run build
      - persist_to_workspace:
          root: .
          paths:
            - build

  deploy:
    docker:
      - image: cimg/node:18.17.0
    working_directory: ~/project
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: "GitHub Pagesへ公開"
          command: |
            git config --global user.email "circleci@example.com"
            git config --global user.name "CircleCI"
            npx gh-pages -d build -r https://${GITHUB_TOKEN}@github.com/skepsishey-spec/nanohana.git -b gh-pages -f

workflows:
  build_and_deploy:
    jobs:
      - build
      - deploy:
          requires:
            - build
